[tool.black]
line-length = 120
target-version = ['py311']
skip-string-normalization = false
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.venv
  | build
  | dist
)/
'''

[tool.codespell]
skip = "examples/atb_models/requirements/*"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
